<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" />

  <!-- Inner white circle -->
  <circle cx="256" cy="256" r="180" fill="#ffffff" fill-opacity="0.15" />

  <!-- Medical Cross Symbol -->
  <rect x="220" y="130" width="72" height="252" rx="16" fill="url(#crossGrad)" />
  <rect x="130" y="220" width="252" height="72" rx="16" fill="url(#crossGrad)" />

  <!-- Small decorative dots -->
  <circle cx="256" cy="80" r="8" fill="#ffffff" fill-opacity="0.5" />
  <circle cx="256" cy="432" r="8" fill="#ffffff" fill-opacity="0.5" />
  <circle cx="80" cy="256" r="8" fill="#ffffff" fill-opacity="0.5" />
  <circle cx="432" cy="256" r="8" fill="#ffffff" fill-opacity="0.5" />

  <!-- Pulse / heartbeat arc -->
  <path d="M 100 340 Q 160 200 220 300 L 256 200 L 292 300 Q 352 200 412 340"
        fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-opacity="0.4" />
</svg>

