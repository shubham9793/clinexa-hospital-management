<div class="page">

    <div class="card">

        <h1>
            {{ isEditMode ? '✏️ Edit Department' : '🏥 Add Department' }}
        </h1>

        <p>
            {{ isEditMode
            ? 'Update hospital department'
            : 'Create hospital department'
            }}
        </p>

        <form (ngSubmit)="createDepartment()">

            <input type="text" placeholder="Department Name" [(ngModel)]="department.name" name="name">

            <textarea placeholder="Description" [(ngModel)]="department.description" name="description">
            </textarea>

            <button type="submit">

                {{ isEditMode
                ? 'Update Department'
                : 'Create Department'
                }}

            </button>

        </form>

    </div>

</div>
