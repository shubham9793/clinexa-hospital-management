<div class="page">

    <div class="decor-circle circle-one"></div>
    <div class="decor-circle circle-two"></div>

    <div class="form-card">

        <button class="back-btn" type="button" (click)="goBack()">
            ← Back
        </button>

        <div class="header">
            <div class="icon-box">
                👩‍💼
            </div>

            <h1>
                {{ isEdit ? 'Edit Receptionist' : 'Add Receptionist' }}
            </h1>

            <p>
                {{
                isEdit
                ? 'Update receptionist profile and login details.'
                : 'Create a receptionist account with secure dashboard access.'
                }}
            </p>
        </div>

        <form (ngSubmit)="saveReceptionist()">

            <div class="input-group">
                <label>Receptionist Name</label>

                <input type="text" placeholder="Enter receptionist name" [(ngModel)]="receptionist.name" name="name"
                    required />
            </div>

            <div class="input-group">
                <label>Email Address</label>

                <input type="email" placeholder="receptionist@clinexa.com" [(ngModel)]="receptionist.email" name="email"
                    required />
            </div>

            <div class="input-group">
                <label>Phone Number</label>

                <input type="text" placeholder="10 digit phone number" [(ngModel)]="receptionist.phone" name="phone"
                    maxlength="10" required />
            </div>

            <div class="input-group">
                <label>
                    Password
                    <small *ngIf="isEdit">
                        Leave blank to keep current
                    </small>
                </label>

                <input type="password" [placeholder]="
            isEdit
              ? 'Enter new password only if changing'
              : 'Create login password'
          " [(ngModel)]="receptionist.password" name="password" [required]="!isEdit" />
            </div>

            <button type="submit" class="submit-btn" [disabled]="isSubmitting">
                {{
                isSubmitting
                ? 'Processing...'
                : isEdit
                ? 'Update Receptionist'
                : 'Create Receptionist Account'
                }}
            </button>

        </form>

        <div class="note-box">
            <span>🔐</span>

            <p>
                The receptionist can use this email and password to access the
                Receptionist Dashboard.
            </p>
        </div>

    </div>

</div>
