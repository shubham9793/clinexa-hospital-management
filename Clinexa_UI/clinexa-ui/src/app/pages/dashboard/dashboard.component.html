<div class="dashboard-container">

  <div *ngIf="isLoading" class="loading-card">
    Loading profile...
  </div>

  <div *ngIf="!isLoading && user">

    <!-- HERO -->

    <div class="hero-card">

      <div>

        <span class="badge">
          Clinexa Healthcare System
        </span>

        <h1>
          Welcome,
          {{ user.name }}
          👋
        </h1>

        <p>
          Manage your account and access your healthcare system securely.
        </p>

      </div>

      <div class="hero-icon">
        🏥
      </div>

    </div>

    <!-- PROFILE -->

    <div class="profile-card">

      <div class="avatar">
        {{ user.name?.charAt(0) }}
      </div>

      <div class="profile-details">

        <div class="row">
          <span>Name</span>
          <strong>{{ user.name }}</strong>
        </div>

        <div class="row">
          <span>Email</span>
          <strong>{{ user.email }}</strong>
        </div>

        <div class="row">
          <span>Role</span>
          <strong>{{ user.role }}</strong>
        </div>

      </div>

    </div>

    <!-- STATS -->

    <div class="stats-grid">

      <div class="stat-card">
        <h2>🔐</h2>
        <p>Secure Login</p>
      </div>

      <div class="stat-card">
        <h2>⚡</h2>
        <p>Fast Access</p>
      </div>

      <div class="stat-card">
        <h2>🏥</h2>
        <p>Clinexa Portal</p>
      </div>

    </div>

    <!-- ACTIONS -->

    <button class="logout-btn" (click)="logout()">

      Logout

    </button>

  </div>

</div>
