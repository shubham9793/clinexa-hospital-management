<div class="forgot-page">
    <div class="forgot-card">

        <div class="brand-icon">
            🏥
        </div>

        <span class="page-badge">
            Account Recovery
        </span>

        <h1>Forgot Password?</h1>

        <p class="subtitle">
            Enter your registered email address. We will send you a secure OTP to reset your password.
        </p>

        <form (ngSubmit)="sendOtp()">

            <div class="form-group">
                <label for="email">
                    Registered Email
                </label>

                <input id="email" type="email" name="email" [(ngModel)]="email" placeholder="Enter your email address"
                    autocomplete="email" required />
            </div>

            <button class="send-btn" type="submit" [disabled]="isSubmitting">
                {{ isSubmitting ? 'Sending OTP...' : 'Send OTP' }}
            </button>

        </form>

        <div class="footer-links">
            <a routerLink="/login/patient">
                ← Back to Login
            </a>
        </div>

    </div>
</div>
