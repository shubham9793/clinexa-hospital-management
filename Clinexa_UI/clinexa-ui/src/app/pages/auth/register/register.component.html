<div class="register-page">

    <div class="register-card">

        <div class="brand-icon">
            🏥
        </div>

        <h1>Create Patient Account</h1>

        <p class="subtitle">
            Register with Clinexa to find doctors and
            manage your appointments.
        </p>

        <form (ngSubmit)="register()">

            <div class="form-grid">

                <div class="form-group full-width">
                    <label for="name">
                        Full Name *
                    </label>

                    <input id="name" type="text" name="name" [(ngModel)]="name" placeholder="Enter your full name"
                        required />
                </div>

                <div class="form-group">
                    <label for="email">
                        Email *
                    </label>

                    <input id="email" type="email" name="email" [(ngModel)]="email" placeholder="Enter your email"
                        required />
                </div>

                <div class="form-group">
                    <label for="phone">
                        Phone Number *
                    </label>

                    <input id="phone" type="tel" name="phone" [(ngModel)]="phone" placeholder="Enter phone number"
                        required />
                </div>

                <div class="form-group">
                    <label for="gender">
                        Gender *
                    </label>

                    <select id="gender" name="gender" [(ngModel)]="gender" required>
                        <option value="">
                            Select gender
                        </option>

                        <option value="Male">
                            Male
                        </option>

                        <option value="Female">
                            Female
                        </option>

                        <option value="Other">
                            Other
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="dob">
                        Date of Birth *
                    </label>

                    <input id="dob" type="date" name="dob" [(ngModel)]="dob" required />
                </div>

                <div class="form-group">
                    <label for="password">
                        Password *
                    </label>

                    <input id="password" type="password" name="password" [(ngModel)]="password"
                        placeholder="Minimum 6 characters" required />
                </div>

                <div class="form-group">
                    <label for="confirmPassword">
                        Confirm Password *
                    </label>

                    <input id="confirmPassword" type="password" name="confirmPassword" [(ngModel)]="confirmPassword"
                        placeholder="Re-enter your password" required />
                </div>

                <div class="form-group full-width">
                    <label for="address">
                        Address
                    </label>

                    <textarea id="address" name="address" [(ngModel)]="address" placeholder="Enter your address"
                        rows="3"></textarea>
                </div>

            </div>

            <button class="register-btn" type="submit" [disabled]="isSubmitting">
                {{
                isSubmitting
                ? 'Creating Account...'
                : 'Register as Patient'
                }}
            </button>

        </form>

        <div class="footer-links">
            <p>
                Already registered?

                <a routerLink="/login/patient">
                    Login here
                </a>
            </p>

            <a class="back-link" routerLink="/manage-patient">
                ← Back to Patient Portal
            </a>
        </div>

    </div>

</div>
