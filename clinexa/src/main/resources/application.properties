spring.application.name=clinexa

# DB_URL/DB_USERNAME/DB_PASSWORD are read from environment variables in
# production (set them in Render's dashboard). The values after the ':'
# are only used as local-dev fallbacks when the env vars aren't set.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/clinexa_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8081}


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Comma-separated list of allowed frontend origins for CORS (see CorsConfig.java)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}